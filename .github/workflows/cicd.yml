name: CI/CD to Kind Cluster

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Set up Docker (for pulling the image)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Set up kubectl
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.33.1'

      # 4. Decode KUBECONFIG from base64 secret
      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 --decode > $HOME/.kube/config

      # 5. Apply Kubernetes manifests in order
      - name: Deploy Namespace
        run: kubectl apply -f namespace.yml

      - name: Deploy App
        run: kubectl apply -f wisecow-deployment.yml

      - name: Deploy Service
        run: kubectl apply -f service.yml

      - name: Deploy Ingress
        run: kubectl apply -f ingress.yml
